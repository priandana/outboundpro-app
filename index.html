<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OutboundPro - Cold Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        #app-container { max-width: 480px; margin: 0 auto; background-color: #f8fafc; height: 100vh; height: 100dvh; position: relative; overflow-y: auto; overflow-x: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .counter-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-weight: bold; font-size: 18px; transition: all 0.2s; }
        .counter-btn:active { transform: scale(0.9); }
        .btn-minus { background: #f1f5f9; color: #64748b; }
        .btn-plus.chiller { background: #3b82f6; color: white; }
        .btn-plus.freezer { background: #06b6d4; color: white; }
        .btn-plus.coklat { background: #f59e0b; color: white; }
        
        .bottom-nav { position: sticky; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-top: 1px solid #f1f5f9; display: flex; justify-content: space-around; padding: 12px 0; z-index: 40; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: #94a3b8; text-decoration: none; }
        .nav-item.active { color: #16a34a; }
        .nav-item i { font-size: 20px; }

        /* Loader */
        .loader-overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); z-index: 60; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #16a34a; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Modal / Bottom Sheet */
        .bottom-sheet { position: absolute; bottom: -100%; left: 0; right: 0; background: white; border-radius: 24px 24px 0 0; padding: 24px; z-index: 50; transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.1); max-height: 80%; display: flex; flex-direction: column; }
        .bottom-sheet.show { bottom: 0; }
        .overlay { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(2px); z-index: 45; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .overlay.show { opacity: 1; pointer-events: auto; }
        
        .list-group { overflow-y: auto; flex-grow: 1; margin-top: 16px; margin-bottom: 20px;}
        .group-item { padding: 16px; border-bottom: 1px solid #f1f5f9; font-weight: 700; font-size: 16px; color: #1e293b; display: flex; justify-content: space-between; align-items: center; }
        .group-item:active { background-color: #f8fafc; }
        .group-item i { color: #60a5fa; font-size: 14px; }

        .toast { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(100px); background: #0f172a; color: white; padding: 12px 24px; border-radius: 100px; font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 10px; opacity: 0; transition: all 0.4s; z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: max-content;}
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast-error { background: #b91c1c; }
    </style>
</head>
<body>

<div id="app-container">
    
    <!-- HEADER -->
    <div class="bg-white px-5 py-4 flex items-center justify-between shadow-sm sticky top-0 z-30">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-green-500/30">
                <i class="fa-solid fa-box text-lg"></i>
            </div>
            <div>
                <h1 class="font-bold text-slate-800 text-lg leading-tight">Outbound<span class="text-green-500">Pro</span></h1>
                <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">Cold Storage</p>
            </div>
        </div>
        <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-600">
            <i class="fa-solid fa-circle-half-stroke"></i>
        </div>
    </div>

    <!-- MAIN FORM -->
    <div class="p-5 pb-24">
        <div class="flex items-center justify-between mb-5">
            <h2 class="text-xl font-bold text-slate-800">Catatan Pemuatan</h2>
            <div class="bg-green-100 text-green-600 px-2 py-1 rounded text-[10px] font-bold flex items-center gap-1">
                <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div> LIVE
            </div>
        </div>

        <form id="outboundForm" class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
            
            <!-- INPUT TANGGAL CARIAN -->
            <div class="mb-5">
                <label class="block text-[10px] font-bold text-slate-400 mb-1 tracking-wider">TANGGAL CARIAN *</label>
                <input type="date" id="tanggal" class="w-full bg-slate-100/50 text-slate-700 text-sm rounded-xl px-4 py-3 border border-slate-200 focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 transition-all font-medium" required>
            </div>

            <!-- ROW: GROUP & AREA -->
            <div class="grid grid-cols-2 gap-3 mb-5">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 tracking-wider">GROUP *</label>
                    <input type="text" id="group-input" readonly placeholder="Pilih Group" class="w-full bg-slate-100/50 text-slate-700 text-sm rounded-xl px-4 py-3 border border-slate-200 focus:outline-none font-medium" onclick="openGroupSheet()" required>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1 tracking-wider">AREA *</label>
                    <select id="area" class="w-full bg-slate-100/50 text-slate-700 text-sm rounded-xl px-4 py-3 border border-slate-200 focus:outline-none font-medium appearance-none" required>
                        <option value="" disabled selected>Pilih Area</option>
                        <option value="AA">Area AA</option>
                        <option value="BB">Area BB</option>
                        <option value="CC">Area CC</option>
                        <option value="DD">Area DD</option>
                    </select>
                </div>
            </div>

            <!-- NOPOL -->
            <div class="mb-6">
                <label class="block text-[10px] font-bold text-slate-400 mb-1 tracking-wider">NOMOR POLISI *</label>
                <input type="text" id="nopol" placeholder="CTH: D 1234 ABC" class="w-full bg-slate-100/50 text-slate-700 text-sm rounded-xl px-4 py-3 border border-slate-200 focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500/20 font-bold uppercase transition-all" required>
            </div>

            <!-- COUNTER BOX -->
            <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100 mb-6 relative">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[11px] font-bold text-slate-500 flex items-center gap-1"><i class="fa-solid fa-box text-orange-400"></i> JUMLAH DUS</span>
                    <span class="text-[11px] font-bold text-blue-600 bg-blue-100 px-2 py-1 rounded">TOTAL : <span id="total-text">0</span></span>
                </div>

                <!-- Chiller -->
                <div class="flex items-center justify-between mb-3 bg-white p-2 rounded-xl shadow-sm border border-slate-50">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-snowflake text-blue-300 w-5 text-center"></i>
                        <span class="font-bold text-slate-700 text-sm">Chiller</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <button type="button" class="counter-btn btn-minus" onclick="updateCount('chiller', -1)"><i class="fa-solid fa-minus"></i></button>
                        <span id="val-chiller" class="font-bold text-slate-800 w-6 text-center text-lg">0</span>
                        <button type="button" class="counter-btn btn-plus chiller" onclick="updateCount('chiller', 1)"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>

                <!-- Freezer -->
                <div class="flex items-center justify-between mb-3 bg-white p-2 rounded-xl shadow-sm border border-slate-50">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-cube text-cyan-400 w-5 text-center"></i>
                        <span class="font-bold text-slate-700 text-sm">Freezer</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <button type="button" class="counter-btn btn-minus" onclick="updateCount('freezer', -1)"><i class="fa-solid fa-minus"></i></button>
                        <span id="val-freezer" class="font-bold text-slate-800 w-6 text-center text-lg">0</span>
                        <button type="button" class="counter-btn btn-plus freezer" onclick="updateCount('freezer', 1)"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>

                <!-- Coklat -->
                <div class="flex items-center justify-between bg-white p-2 rounded-xl shadow-sm border border-slate-50">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-cookie text-amber-600 w-5 text-center"></i>
                        <span class="font-bold text-slate-700 text-sm">Coklat</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <button type="button" class="counter-btn btn-minus" onclick="updateCount('coklat', -1)"><i class="fa-solid fa-minus"></i></button>
                        <span id="val-coklat" class="font-bold text-slate-800 w-6 text-center text-lg">0</span>
                        <button type="button" class="counter-btn btn-plus coklat" onclick="updateCount('coklat', 1)"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
            </div>

            <!-- ROW: QC & LOADER -->
            <div class="grid grid-cols-2 gap-3 mb-5">
                <input type="text" id="qc" placeholder="Nama QC" class="w-full bg-slate-50 text-slate-700 text-sm rounded-xl px-4 py-3 border border-slate-100 focus:outline-none focus:border-green-500 font-medium">
                <input type="text" id="loader" placeholder="Nama Loader" class="w-full bg-slate-50 text-slate-700 text-sm rounded-xl px-4 py-3 border border-slate-100 focus:outline-none focus:border-green-500 font-medium">
            </div>

            <!-- CATATAN -->
            <div class="mb-5">
                <label class="block text-[10px] font-bold text-slate-400 mb-1 tracking-wider uppercase">Keterangan Tambahan</label>
                <textarea id="catatan" rows="2" placeholder="Catatan khusus (opsional)..." class="w-full bg-slate-50 text-slate-700 text-sm rounded-xl px-4 py-3 border border-slate-100 focus:outline-none focus:border-green-500 font-medium resize-none"></textarea>
            </div>

            <!-- UPLOAD FOTO -->
            <div class="mb-6">
                <input type="file" id="photo" accept="image/*" capture="environment" class="hidden" onchange="previewPhoto(event)">
                <label for="photo" id="photo-label" class="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-slate-300 rounded-xl bg-slate-50 hover:bg-slate-100 transition-colors cursor-pointer relative overflow-hidden">
                    <i class="fa-solid fa-camera text-2xl text-slate-400 mb-1"></i>
                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Ambil Foto Muatan</span>
                    <img id="photo-preview" class="absolute inset-0 w-full h-full object-cover hidden">
                </label>
            </div>

            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-green-600/30 transition-all text-sm tracking-wide">
                SIMPAN DATA
            </button>
        </form>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <a href="#" class="nav-item active"><img src="https://img.icons8.com/color/48/000000/edit-property.png" class="w-6 h-6 mb-1">Input</a>
        <a href="#" class="nav-item"><img src="https://img.icons8.com/color/48/000000/clock--v1.png" class="w-6 h-6 mb-1">Riwayat</a>
        <a href="#" class="nav-item"><img src="https://img.icons8.com/color/48/000000/bar-chart.png" class="w-6 h-6 mb-1">Summary</a>
    </div>

    <!-- LOADER -->
    <div class="loader-overlay" id="loader-view">
        <div class="spinner mb-3"></div>
        <div class="text-sm font-bold text-slate-700">Menyimpan Data...</div>
        <div class="text-[10px] text-slate-400">Mohon tunggu sebentar</div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div class="toast" id="toastMsg">
        <i class="fa-solid fa-check-square text-green-400 text-lg"></i>
        <span>DATA BERHASIL DISIMPAN</span>
    </div>

    <!-- OVERLAY UTK MODAL -->
    <div class="overlay" id="main-overlay" onclick="closeGroupSheet()"></div>

    <!-- BOTTOM SHEET GROUP -->
    <div class="bottom-sheet" id="group-sheet">
        <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-4"></div>
        <h3 class="text-center font-bold text-slate-800 text-lg mb-4">Pilih Group</h3>
        
        <input type="text" id="sheet-search" placeholder="Cari kode group..." class="w-full bg-slate-100 text-slate-700 text-sm rounded-xl px-4 py-3 focus:outline-none mb-2 font-medium" onkeyup="filterGroup()">
        
        <div class="list-group" id="group-list">
            <div class="text-[10px] font-bold text-slate-400 tracking-wider mb-2 mt-2">GRUP BDG</div>
            <div class="group-item" onclick="selectGroup('BDG01')">BDG01 <i class="fa-solid fa-play"></i></div>
            <div class="group-item" onclick="selectGroup('BDG02')">BDG02 <i class="fa-solid fa-play"></i></div>
            <div class="group-item" onclick="selectGroup('BDG03')">BDG03 <i class="fa-solid fa-play"></i></div>
            <div class="text-[10px] font-bold text-slate-400 tracking-wider mb-2 mt-4">GRUP JKT</div>
            <div class="group-item" onclick="selectGroup('JKT01')">JKT01 <i class="fa-solid fa-play"></i></div>
            <div class="group-item" onclick="selectGroup('JKT02')">JKT02 <i class="fa-solid fa-play"></i></div>
        </div>
    </div>

</div>

<script>
    // MASUKKAN LINK GOOGLE APPS SCRIPT ANDA DI SINI
    const API_URL = "TARUH_URL_GOOGLE_SCRIPT_ANDA_DISINI";

    let counts = { chiller: 0, freezer: 0, coklat: 0 };
    let photoBase64 = "";

    // Set Default Tanggal ke Hari Ini saat halaman dimuat
    document.addEventListener("DOMContentLoaded", function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('tanggal').value = today;
    });

    function updateCount(type, val) {
        let newVal = counts[type] + val;
        if (newVal >= 0) {
            counts[type] = newVal;
            document.getElementById('val-' + type).innerText = newVal;
            document.getElementById('total-text').innerText = counts.chiller + counts.freezer + counts.coklat;
        }
    }

    // Modal Group
    function openGroupSheet() {
        document.getElementById('main-overlay').classList.add('show');
        document.getElementById('group-sheet').classList.add('show');
        document.getElementById('sheet-search').value = "";
        filterGroup();
    }
    function closeGroupSheet() {
        document.getElementById('main-overlay').classList.remove('show');
        document.getElementById('group-sheet').classList.remove('show');
    }
    function selectGroup(val) {
        document.getElementById('group-input').value = val;
        closeGroupSheet();
    }
    function filterGroup() {
        let input = document.getElementById('sheet-search').value.toUpperCase();
        let items = document.querySelectorAll('.group-item');
        items.forEach(function(item) {
            if (item.innerText.toUpperCase().indexOf(input) > -1) {
                item.style.display = "flex";
            } else {
                item.style.display = "none";
            }
        });
    }

    // Foto
    function previewPhoto(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('photo-preview');
                img.src = e.target.result;
                img.classList.remove('hidden');
                photoBase64 = e.target.result;
            }
            reader.readAsDataURL(file);
        }
    }

    // Submit
    document.getElementById('outboundForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const payload = {
            tanggal: document.getElementById('tanggal').value,
            group: document.getElementById('group-input').value,
            area: document.getElementById('area').value,
            nopol: document.getElementById('nopol').value,
            chiller: counts.chiller,
            freezer: counts.freezer,
            coklat: counts.coklat,
            totalMuatan: counts.chiller + counts.freezer + counts.coklat,
            qc: document.getElementById('qc').value,
            loader: document.getElementById('loader').value,
            catatan: document.getElementById('catatan').value,
            photoBase64: photoBase64
        };

        if (payload.totalMuatan === 0) {
            showToast("Total muatan tidak boleh 0", true);
            return;
        }

        document.getElementById('loader-view').style.display = 'flex';

        fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'text/plain;charset=utf-8',
            },
            body: JSON.stringify(payload)
        })
        .then(function() {
            document.getElementById('loader-view').style.display = 'none';
            showToast("DATA BERHASIL DISIMPAN", false);
            
            // Reset form
            document.getElementById('outboundForm').reset();
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('tanggal').value = today; // Kembalikan ke tgl hari ini
            counts = { chiller: 0, freezer: 0, coklat: 0 };
            document.getElementById('val-chiller').innerText = 0;
            document.getElementById('val-freezer').innerText = 0;
            document.getElementById('val-coklat').innerText = 0;
            document.getElementById('total-text').innerText = 0;
            document.getElementById('photo-preview').classList.add('hidden');
            document.getElementById('photo-preview').src = "";
            photoBase64 = "";
        })
        .catch(function(error) {
            document.getElementById('loader-view').style.display = 'none';
            showToast("GAGAL UPLOAD DATA", true);
            console.error('Error:', error);
        });
    });

    function showToast(text, isError) {
        var toast = document.getElementById('toastMsg');
        toast.innerHTML = isError 
            ? '<i class="fa-solid fa-triangle-exclamation text-yellow-400 text-lg"></i> <span>' + text + '</span>'
            : '<i class="fa-solid fa-check-square text-green-400 text-lg"></i> <span>' + text + '</span>';
        
        if(isError) {
            toast.classList.add('toast-error');
        } else {
            toast.classList.remove('toast-error');
        }
        
        toast.classList.add('show');
        setTimeout(function() { toast.classList.remove('show'); }, 3000);
    }
</script>

</body>
</html>
